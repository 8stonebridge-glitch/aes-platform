id: "tpl-marketplace-lite"
name: "Marketplace Lite"
app_class: "marketplace"
description: "Lightweight marketplace template with product listings, search and filters, seller profiles, order management, and payment integration. Supports Stripe and Paystack adapters."
type: "template"
baseline_features:
  - "User authentication"
  - "Product listing page"
  - "Product detail page"
  - "Search and filters"
  - "Shopping cart"
  - "Checkout and payment"
  - "Order management"
  - "Order detail and tracking"
  - "Seller profile and dashboard"
  - "Seller product management"
  - "Buyer order history"
  - "Review and ratings"
  - "Notification center"
  - "Role-based access control"
  - "Admin dashboard"
optional_features:
  - "Wishlist"
  - "Dispute resolution"
  - "Seller analytics"
  - "Promotions and coupons"
repo: "aes-templates"
package_path: "apps/marketplace-lite"
branch_or_tag: "main"
owning_team: "aes-core"
dependencies:
  - "dashboard-shell"
  - "auth-module"
  - "data-table-page"
  - "detail-page"
  - "payment-adapter-stripe"
  - "payment-adapter-paystack"
  - "notification-service"
tests:
  suite: "marketplace-lite-e2e"
  last_run: "2026-03-23T00:00:00Z"
  status: "unknown"
usage_constraints:
  - "Requires at least one payment adapter configured"
last_validation_date: "2026-03-23T00:00:00Z"
tags: ["template", "marketplace", "e-commerce", "payments"]
promotion_tier: "DERIVED"
donor_lineage: []
