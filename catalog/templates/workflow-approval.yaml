id: "tpl-workflow-approval"
name: "Workflow Approval App"
app_class: "workflow_approval_system"
description: "Approval workflow application template with request submission, approval queues, delegation, audit trail, and notification integration. Suitable for procurement, leave requests, and document sign-off."
type: "template"
baseline_features:
  - "User authentication"
  - "Request submission form"
  - "Request detail page"
  - "Approval queue inbox"
  - "Approval and rejection workflow"
  - "Delegation management"
  - "Request history and status tracking"
  - "Audit trail"
  - "Notification center"
  - "Dashboard with pending and completed counts"
  - "Role-based access control"
  - "Settings page"
optional_features:
  - "Bulk approval"
  - "SLA tracking"
  - "Custom workflow stages"
  - "Document attachments"
repo: "aes-templates"
package_path: "apps/workflow-approval"
