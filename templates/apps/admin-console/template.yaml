id: "templates-admin-console"
name: "Admin Console"
app_class: "internal_ops_tool"
description: "Back-office admin panel for managing users, resources, configurations, and audit logs. Designed for internal teams who need full CRUD access with role-gated views."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "Clerk admin/super_admin roles"
  - "Sidebar nav with icon groups"
  - "Data table page with server-side filtering"
  - "Detail page with tabs"
  - "Settings page"
  - "Audit log viewer"
  - "Role-gated route protection"
  - "Breadcrumb navigation"
  - "Global search"
  - "User management table"
  - "Org-level configuration editor"
optional_features:
  - "Dark mode toggle"
  - "CSV/JSON export from tables"
  - "Bulk actions on table rows"
  - "Notification center"
  - "Impersonation mode for support"
  - "API key management"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "retool"
  - "adminjs"
  - "forest-admin"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
