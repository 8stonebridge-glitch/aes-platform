id: "templates-customer-portal"
name: "Customer Portal"
app_class: "customer_portal"
description: "Self-service portal for external customers to view their account, manage subscriptions, submit support requests, and access documents."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "Customer dashboard with account summary"
  - "Subscription/plan management"
  - "Support ticket submission and tracking"
  - "Document/invoice download center"
  - "Profile and preferences editor"
  - "Notification preferences"
  - "Org switching for multi-org customers"
  - "Knowledge base search"
  - "Onboarding wizard for new customers"
optional_features:
  - "Live chat widget integration"
  - "Usage analytics dashboard"
  - "Referral program page"
  - "Custom branding per org"
  - "Two-factor auth enrollment"
  - "API token management"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "stripe-dashboard"
  - "intercom"
  - "zendesk-help-center"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
