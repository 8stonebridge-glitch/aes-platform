id: "templates-fintech-wallet"
name: "Fintech Wallet"
app_class: "fintech_wallet"
description: "Financial services app template for account management, transfers, transaction history, and beneficiary management with strict audit requirements and offline balance viewing."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "Account overview dashboard"
  - "Transaction list with filters"
  - "Transfer form shell"
  - "XState transfer state machine shell"
  - "Beneficiary management"
  - "Payment integration shell (Stripe/Paystack)"
  - "Audit trail for financial mutations"
  - "Offline balance viewing (PWA)"
  - "Multi-currency display"
  - "Transaction receipt/detail view"
  - "PIN/biometric confirmation for sensitive actions"
optional_features:
  - "Recurring transfer scheduling"
  - "Budget tracking and spending categories"
  - "Virtual card management"
  - "KYC verification flow"
  - "Statement generation and download"
  - "Savings goals tracker"
  - "Bill payment integration"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "wise"
  - "chipper-cash"
  - "paystack-dashboard"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
