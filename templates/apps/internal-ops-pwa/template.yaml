id: "templates-internal-ops-pwa"
name: "Internal Ops PWA"
app_class: "internal_ops_pwa"
description: "Progressive web app for field teams and internal operations staff who need mobile-first access to tasks, checklists, and status updates with offline support."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "PWA manifest and service worker"
  - "Offline-first data sync with Convex"
  - "Task list with status filters"
  - "Checklist completion flow"
  - "Push notification support"
  - "Bottom tab navigation (mobile)"
  - "Pull-to-refresh"
  - "Photo capture and attachment"
  - "Location tagging"
  - "Daily summary dashboard"
optional_features:
  - "Barcode/QR scanner"
  - "Offline form queue with retry"
  - "Geofence-triggered tasks"
  - "Shift scheduling view"
  - "Team chat"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "fieldwire"
  - "connecteam"
  - "when-i-work"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
