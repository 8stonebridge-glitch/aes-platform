id: "templates-marketplace-lite"
name: "Marketplace Lite"
app_class: "marketplace"
description: "Two-sided marketplace template for listing, searching, and transacting items or services between buyers and sellers with review and messaging capabilities."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "Listing creation form with image upload"
  - "Search results page with filters and sorting"
  - "Listing detail page with gallery"
  - "Seller profile page"
  - "Buyer/seller messaging"
  - "Review and rating system"
  - "Category browsing"
  - "Saved/favorited listings"
  - "Order/transaction status tracker"
  - "Responsive grid and list view toggle"
optional_features:
  - "Payment integration (Stripe Connect)"
  - "Dispute resolution flow"
  - "Promoted/featured listings"
  - "Seller analytics dashboard"
  - "Geolocation-based search"
  - "Price alert subscriptions"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "etsy"
  - "mercari"
  - "sharetribe"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
