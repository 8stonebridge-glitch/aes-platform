id: "templates-workflow-approval"
name: "Workflow Approval"
app_class: "workflow_approval_system"
description: "Request-and-approval system for structured workflows such as expense approvals, leave requests, procurement, or any multi-step review process with role-based routing."
stack:
  frontend: "next.js"
  backend: "convex"
  auth: "clerk"
  deploy: "vercel"
  state_machine: "xstate"
baseline_features:
  - "XState integration for approval state machines"
  - "Request submission form with multi-step wizard"
  - "Review queue with filters"
  - "Approval/reject flow with confirmation"
  - "Status timeline per request"
  - "Role-gated actions (submitter, reviewer, admin)"
  - "Audit trail per request"
  - "Comment thread on requests"
  - "Email notification triggers"
  - "Bulk approval for reviewers"
optional_features:
  - "Delegation and proxy approval"
  - "SLA tracking with overdue alerts"
  - "Approval chain builder (admin)"
  - "Analytics dashboard (approval times, bottlenecks)"
  - "File attachment on requests"
  - "Conditional routing rules"
fixed_in_template:
  - "App shell (sidebar, header, breadcrumbs, mobile nav)"
  - "Clerk auth wiring (middleware, protected routes, org switching)"
  - "Convex project structure (schema boilerplate, orgId pattern)"
  - "Form framework (React Hook Form + Zod + shadcn)"
  - "Data table framework (TanStack Table + shadcn)"
  - "Error boundary wrapper"
  - "Design tokens (Tailwind config, CSS variables)"
  - "Vercel deploy config"
  - "CI scaffold (GitHub Actions)"
left_for_builder:
  - "Page content and entity-specific views"
  - "Custom permission rules per role"
  - "Entity-specific fields, indexes, validators"
  - "Form field definitions and validation rules"
  - "State machine definitions (states, transitions, guards)"
  - "Notification workflow definitions"
  - "Error recovery logic per feature"
  - "Offline data strategy per feature"
best_donors:
  - "jira-service-management"
  - "kissflow"
  - "processmaker"
promotion_tier: "DERIVED"
created_at: "2026-03-23T00:00:00Z"
